<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #e74c3c;
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #2c3e50;
            line-height: 1;
        }
        h2 {
            font-size: 22px;
            margin: 15px 0;
            color: #34495e;
        }
        p {
            font-size: 15px;
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .code-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #c0392b;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page or endpoint you are looking for does not exist or access is restricted.</p>
        <div class="code-box">Error Code: ENDPOINT_NOT_FOUND</div>
    </div>

</body>
</html>
